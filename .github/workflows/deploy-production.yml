name: Deploy Production via FTPS

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Pilih test dahulu, kemudian deploy"
        required: true
        default: test
        type: choice
        options:
          - test
          - deploy

permissions:
  contents: read

concurrency:
  group: rsisimpeg-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Data ini bukan rahasia dan sesuai konfigurasi cPanel.
      FTP_HOST: ftp.rsibanjarnegara.inventa.id
      FTP_PORT: "21"
      FTP_REMOTE_DIR: "/"

      # Simpan keduanya di GitHub Actions Secrets.
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      LFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore timestamps
        uses: chetan/git-restore-mtime-action@v2

      - name: Validasi secret
        shell: bash
        run: |
          set -euo pipefail

          for variable in FTP_USERNAME LFTP_PASSWORD
          do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::$variable belum diisi di GitHub Actions Secrets"
              exit 1
            fi
          done

      - name: Install lftp
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            lftp \
            ca-certificates

          lftp --version

      - name: Tes koneksi FTPS
        shell: bash
        run: |
          set -euo pipefail

          lftp --norc <<LFTP
          set cmd:fail-exit yes

          set ftp:ssl-auth TLS
          set ftp:ssl-force yes
          set ftp:ssl-protect-data yes
          set ftp:ssl-protect-list yes
          set ftp:passive-mode yes

          set ssl:use-sni yes

          # Workaround karena sertifikat server tidak cocok
          # dengan hostname FTP yang diberikan oleh hosting.
          set ssl:verify-certificate no
          set ssl:check-hostname no

          set net:max-retries 2
          set net:timeout 20
          set net:reconnect-interval-base 5

          open -p "$FTP_PORT" \
            --user "$FTP_USERNAME" \
            --env-password \
            "ftp://$FTP_HOST"

          cd "$FTP_REMOTE_DIR"

          pwd
          cls -la

          bye
          LFTP

      - name: Setup Node.js
        if: ${{ inputs.mode == 'deploy' }}
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Build frontend
        if: ${{ inputs.mode == 'deploy' }}
        shell: bash
        run: |
          set -euo pipefail

          npm ci
          npm run build

      - name: Upload ke produksi
        if: ${{ inputs.mode == 'deploy' }}
        shell: bash
        run: |
          set -euo pipefail

          lftp --norc <<LFTP
          set cmd:fail-exit yes

          set ftp:ssl-auth TLS
          set ftp:ssl-force yes
          set ftp:ssl-protect-data yes
          set ftp:ssl-protect-list yes
          set ftp:passive-mode yes

          set ssl:use-sni yes

          # Workaround sementara untuk sertifikat hosting.
          set ssl:verify-certificate no
          set ssl:check-hostname no

          set net:max-retries 2
          set net:timeout 30
          set net:reconnect-interval-base 5

          # Hosting biasanya menolak perubahan permission.
          set mirror:set-permissions no

          open -p "$FTP_PORT" \
            --user "$FTP_USERNAME" \
            --env-password \
            "ftp://$FTP_HOST"

          cd "$FTP_REMOTE_DIR"
          lcd "$GITHUB_WORKSPACE"

          mirror --reverse --verbose --parallel=2 \
            --exclude-glob ".git" \
            --exclude-glob ".git/**" \
            --exclude-glob ".github" \
            --exclude-glob ".github/**" \
            --exclude-glob ".env" \
            --exclude-glob ".env.*" \
            --exclude-glob "storage/**" \
            --exclude-glob "vendor/**" \
            --exclude-glob "node_modules/**" \
            --exclude-glob "bootstrap/cache/**" \
            --exclude-glob "public/storage" \
            --exclude-glob "public/storage/**" \
            --exclude-glob "tests/**" \
            --exclude-glob "deploy.sh" \
            ./ ./

          bye
          LFTP